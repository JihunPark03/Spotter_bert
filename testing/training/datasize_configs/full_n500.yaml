model:
  id: answerdotai/ModernBERT-large
  max_length: 512
data:
  path: testing/data/deepseek_synthetic_reviews.jsonl
  test_size: 0.1
  seed: 42
  max_samples: 500
fine_tuning:
  method: full
  rank: 8
  base_rank: 8
  lora_dropout: null
  lora_alpha: null
  min_rank: 4
  max_rank: 48
  init_rank: null
  tinit_fraction: 0.2
  tfinal_fraction: 0.85
  delta_fraction: 0.05
  target_modules: null
  modernbert_target_leaf_modules:
  - Wqkv
  - Wo
training:
  output_dir: /home/jihun/Spotter_bert/testing/training/datasize_runs/full_n500
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-05
  num_train_epochs: 5
  max_steps: -1
  bf16: true
  optim: adamw_torch_fused
  logging_steps: 100
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  load_best_model_at_end: true
  report_to: wandb
  wandb_project: spotter-bert-various-dt-various-method
  run_name: modernbert-full-n500
